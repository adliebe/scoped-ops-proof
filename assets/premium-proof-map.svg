<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" role="img" aria-labelledby="title desc">
  <title id="title">Premium proof map</title>
  <desc id="desc">Diagram linking finance model, platform architecture, workflow pilot, and close-ready scopes.</desc>
  <rect width="900" height="680" fill="#f6f7fb"/>
  <rect x="54" y="54" width="792" height="572" rx="18" fill="#ffffff" stroke="#d8deea" stroke-width="3"/>
  <text x="92" y="116" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#141821">Premium proof stack</text>
  <text x="92" y="154" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#596273">Buyer-safe artifacts that support priced first milestones.</text>

  <g>
    <rect x="92" y="204" width="310" height="130" rx="12" fill="#fff8e8" stroke="#a06f1a" stroke-width="3"/>
    <text x="122" y="246" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#141821">Finance model</text>
    <text x="122" y="280" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#596273">Forecast, cash flow, ROI, payback</text>
    <text x="122" y="310" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#a06f1a">EUR 750 / $750-$1,500</text>
  </g>

  <g>
    <rect x="498" y="204" width="310" height="130" rx="12" fill="#edf5ff" stroke="#285c9f" stroke-width="3"/>
    <text x="528" y="246" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#141821">n8n + Postgres</text>
    <text x="528" y="280" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#596273">Schema, ledger, approval, canary</text>
    <text x="528" y="310" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#285c9f">$2,500 architecture pass</text>
  </g>

  <g>
    <rect x="92" y="404" width="310" height="130" rx="12" fill="#edf9f5" stroke="#26735b" stroke-width="3"/>
    <text x="122" y="446" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#141821">GHL / Make / SMS</text>
    <text x="122" y="480" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#596273">Webhook, alerts, approval gate</text>
    <text x="122" y="510" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#26735b">$1,200 clone-ready pilot</text>
  </g>

  <g>
    <rect x="498" y="404" width="310" height="130" rx="12" fill="#f3f0ff" stroke="#6653a6" stroke-width="3"/>
    <text x="528" y="446" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#141821">Close-ready scopes</text>
    <text x="528" y="480" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#596273">Packets, gates, payment route</text>
    <text x="528" y="510" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#6653a6">4 packaged first milestones</text>
  </g>

  <path d="M 402 269 C 448 269 452 269 498 269" fill="none" stroke="#141821" stroke-width="4" stroke-linecap="round"/>
  <path d="M 247 334 C 247 362 247 376 247 404" fill="none" stroke="#141821" stroke-width="4" stroke-linecap="round"/>
  <path d="M 653 334 C 653 362 653 376 653 404" fill="none" stroke="#141821" stroke-width="4" stroke-linecap="round"/>
  <path d="M 402 469 C 448 469 452 469 498 469" fill="none" stroke="#141821" stroke-width="4" stroke-linecap="round"/>

  <text x="92" y="586" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#596273">All samples are synthetic or public-safe. No secrets, banking, payout data, cookies, or private client records.</text>
</svg>
